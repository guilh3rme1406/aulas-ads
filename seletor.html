<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seletor de Páginas - Desafio Aula 03</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="container">
        <h1>Seletor de Páginas</h1>
        
        <section class="demo-section">
            <h2>Normal</h2>
            <nav class="pagination normal">
                <ul>
                    <li><a href="#">&laquo;</a></li>
                    <li><a href="#">1</a></li>

                </ul>
            </nav>

        <section class="demo-section">
            <h2>Após passar o mouse:</h2>
            <nav class="pagination interactive">
                <ul>
                    <li><a href="#">&laquo;</a></li>
                    <li><a href="#">1</a></li>
                    <li><a href="#">2</a></li>
                    <li><a href="#">3</a></li>
                    <li><a href="#">4</a></li>
                    <li><a href="#">&raquo;</a></li>
                </ul>
            </nav>
        </section>

</html>
